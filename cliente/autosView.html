<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vista de Carros</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://kit.fontawesome.com/yourkitid.js" crossorigin="anonymous"></script> <!-- Reemplaza 'yourkitid' con tu kit de FontAwesome -->
  <style>
    .details-container {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
    }
    .expanded > .details-container {
      max-height: 500px; /* suficiente para mostrar todo el contenido */
    }
  </style>  
</head>
<body class="bg-gray-100 font-sans text-gray-800">

  <!-- Encabezado Hero -->
  <header class="bg-gradient-to-r from-gray-800 to-gray-900 text-white py-16 relative">
    <div class="absolute inset-0 opacity-10 bg-cover bg-center" style="background-image: url('https://images.unsplash.com/photo-1494976388531-d1058494cdd8?auto=format&fit=crop&w=1350&q=80');"></div>
    <div class="relative z-10 text-center px-4">
      <h1 class="text-4xl font-bold mb-4"><i class="fas fa-car text-red-500 mr-2"></i>Explora Nuestro Catálogo</h1>
      <p class="text-lg max-w-xl mx-auto">Descubre la combinación perfecta de estilo, rendimiento y confianza en nuestra selección premium de vehículos.</p>
      <div class="mt-6 flex justify-center gap-6 flex-wrap">
        <div class="bg-white/10 backdrop-blur px-6 py-4 rounded-lg border border-white/20">
          <div class="text-2xl font-bold text-red-400">150+</div>
          <div class="text-sm uppercase tracking-wider text-white/80">Vehículos</div>
        </div>
        <div class="bg-white/10 backdrop-blur px-6 py-4 rounded-lg border border-white/20">
          <div class="text-2xl font-bold text-red-400">25</div>
          <div class="text-sm uppercase tracking-wider text-white/80">Marcas</div>
        </div>
      </div>
    </div>
  </header>

  <!-- Contenedor de Cards -->
  <main id="cars-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 px-4 py-10">
    <!-- Las tarjetas se generan dinámicamente aquí -->
  </main>

  <!-- Script para consumir la API y renderizar las tarjetas -->
  <script>
    async function fetchAutos() {
      const container = document.getElementById("cars-container");
  
      try {
        const response = await fetch("http://localhost:8080/api/automoviles");
        const autos = await response.json();
  
        autos.forEach((auto, index) => {
          const card = document.createElement("div");
          card.className =
            "bg-white rounded-lg shadow hover:shadow-xl transition-all";
  
          const header = document.createElement("div");
          header.className =
            "bg-gray-800 text-white px-6 py-4 cursor-pointer rounded-t-lg";
          header.innerHTML = `<h2 class="text-lg font-semibold">${auto.marca} ${auto.modelo}</h2>`;
  
          const details = document.createElement("div");
          details.className = "details-container"; // controlamos con clase
  
          const carDetails = document.createElement("div");
          carDetails.className = "px-6 py-4 bg-gray-50 space-y-2 text-sm";
          carDetails.innerHTML = `
            <p><strong>Modelo:</strong> ${auto.modelo}</p>
            <p><strong>Color:</strong> ${auto.color}</p>
            <p><strong>Placas:</strong> ${auto.placas}</p>
            <p><strong>Tipo:</strong> ${auto.tipo}</p>
            <p><strong>Contacto Proveedor:</strong> ${auto.contactoProveedor || 'No disponible'}</p>
          `;
  
          details.appendChild(carDetails);
  
          header.addEventListener("click", () => {
            // Cierra todos los demás
            document.querySelectorAll("#cars-container > div").forEach((cardEl) => {
              if (cardEl !== card) {
                cardEl.classList.remove("expanded");
              }
            });
  
            // Alternar solo la tarjeta clickeada
            card.classList.toggle("expanded");
          });
  
          card.appendChild(header);
          card.appendChild(details);
          container.appendChild(card);
        });
      } catch (err) {
        container.innerHTML =
          "<p class='text-red-500'>Error al cargar automóviles</p>";
        console.error(err);
      }
    }
  
    fetchAutos();
  </script>  
</body>
</html>
